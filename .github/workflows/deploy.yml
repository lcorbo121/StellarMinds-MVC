name: Deploy Frontend to SOMEE

on:
  push:
    branches: [ somee ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore AppWeb/StellarMinds/StellarMinds.csproj -r win-x64

      - name: Publish (self-contained win-x64)
        run: dotnet publish AppWeb/StellarMinds/StellarMinds.csproj -c Release --self-contained true -r win-x64 -o ./publish --no-restore

      - name: Fix SqlClient DLL (reemplazar stub por implementación real)
        run: |
          DLL=$(find ./publish/runtimes/win -name "Microsoft.Data.SqlClient.dll" 2>/dev/null | head -1)
          if [ -n "$DLL" ]; then
            cp "$DLL" ./publish/Microsoft.Data.SqlClient.dll
            echo "Copiado desde: $DLL"
          else
            echo "SqlClient DLL no encontrado en runtimes, se omite el paso"
          fi

      - name: Fix web.config (outofprocess para SOMEE)
        run: |
          cat > ./publish/web.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <handlers>
                <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified" />
              </handlers>
              <aspNetCore processPath=".\StellarMinds.exe"
                          arguments=""
                          stdoutLogEnabled="true"
                          stdoutLogFile=".\logs\stdout"
                          hostingModel="outofprocess">
                <environmentVariables>
                  <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" />
                </environmentVariables>
              </aspNetCore>
            </system.webServer>
          </configuration>
          EOF

      - name: Crear app_offline.htm para desbloquear archivos en SOMEE
        run: echo "offline" > ./publish/app_offline.htm

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_FE_HOST }}
          username: ${{ secrets.FTP_FE_USER }}
          password: ${{ secrets.FTP_FE_PASSWORD }}
          local-dir: ./publish/
          server-dir: /www.335305-364673-MVC.somee.com/
          exclude: |
            **/.git*
            **/.git*/**

      - name: Quitar app_offline.htm para reactivar la app
        run: |
          rm ./publish/app_offline.htm
          curl -s --user "${{ secrets.FTP_FE_USER }}:${{ secrets.FTP_FE_PASSWORD }}" \
            -Q "DELE www.335305-364673-MVC.somee.com/app_offline.htm" \
            "ftp://${{ secrets.FTP_FE_HOST }}" || \
          curl -s --user "${{ secrets.FTP_FE_USER }}:${{ secrets.FTP_FE_PASSWORD }}" \
            -X "DELE app_offline.htm" \
            "ftp://${{ secrets.FTP_FE_HOST }}/www.335305-364673-MVC.somee.com/app_offline.htm" || true
